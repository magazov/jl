name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@cross

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Set archive name
        id: archive
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          name="jl-${tag}-${{ matrix.target }}"
          echo "name=${name}" >> "$GITHUB_OUTPUT"

      - name: Generate shell completions
        shell: bash
        run: |
          mkdir completions
          if [ "${{ matrix.cross }}" = "true" ]; then
            echo "Skipping completions for cross-compiled target"
          elif [ "${{ matrix.archive }}" = "zip" ]; then
            ./target/${{ matrix.target }}/release/jl.exe --completions bash > completions/jl.bash
            ./target/${{ matrix.target }}/release/jl.exe --completions zsh > completions/_jl
            ./target/${{ matrix.target }}/release/jl.exe --completions fish > completions/jl.fish
          else
            ./target/${{ matrix.target }}/release/jl --completions bash > completions/jl.bash
            ./target/${{ matrix.target }}/release/jl --completions zsh > completions/_jl
            ./target/${{ matrix.target }}/release/jl --completions fish > completions/jl.fish
          fi

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          staging="${{ steps.archive.outputs.name }}"
          mkdir "$staging"
          cp target/${{ matrix.target }}/release/jl "$staging/"
          cp LICENSE README.md "$staging/"
          if [ -f completions/jl.bash ]; then
            cp -r completions "$staging/"
          fi
          tar czf "$staging.tar.gz" "$staging"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          staging="${{ steps.archive.outputs.name }}"
          mkdir "$staging"
          cp target/${{ matrix.target }}/release/jl.exe "$staging/"
          cp LICENSE README.md "$staging/"
          if [ -f completions/jl.bash ]; then
            cp -r completions "$staging/"
          fi
          7z a "$staging.zip" "$staging"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.archive.outputs.name }}
          path: ${{ steps.archive.outputs.name }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum jl-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            artifacts/*

  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Update formula
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"

          sha_linux_x86=$(sha256sum artifacts/jl-${tag}-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)
          sha_linux_arm=$(sha256sum artifacts/jl-${tag}-aarch64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)
          sha_macos_x86=$(sha256sum artifacts/jl-${tag}-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          sha_macos_arm=$(sha256sum artifacts/jl-${tag}-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)

          cat > HomebrewFormula/jl.rb <<FORMULA
          # Auto-generated by release workflow. Do not edit manually.
          class Jl < Formula
            desc "A JSON log pretty-printer"
            homepage "https://github.com/genuss/jl"
            license "MIT"
            version "${version}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/genuss/jl/releases/download/${tag}/jl-${tag}-aarch64-apple-darwin.tar.gz"
                sha256 "${sha_macos_arm}"
              else
                url "https://github.com/genuss/jl/releases/download/${tag}/jl-${tag}-x86_64-apple-darwin.tar.gz"
                sha256 "${sha_macos_x86}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/genuss/jl/releases/download/${tag}/jl-${tag}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${sha_linux_arm}"
              else
                url "https://github.com/genuss/jl/releases/download/${tag}/jl-${tag}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${sha_linux_x86}"
              end
            end

            def install
              bin.install "jl"
              generate_completions_from_executable(bin/"jl", "--completions")
            end

            test do
              pipe_output("#{bin}/jl", '{"message":"hello"}', 0)
            end
          end
          FORMULA

      - name: Commit and push formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          git rebase origin/master
          git add HomebrewFormula/jl.rb
          git commit -m "chore: update Homebrew formula to ${GITHUB_REF_NAME}"
          git push origin master
